<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Decorados • Wood Look Single</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_layout_base.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_2x4.css">
</head>
<body>
  <main class="layout">

      <div class="layout-header">
        <div>
          <h1 class="h1">WOOD LOOK SINGLE</h1>               <!--mude aqui-->
          <div class="book-label">Decorados</div>
        </div>
      </div>

      <section class="grid grid-2x4">
        
        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_white.png" alt="white">
          <div class="card-info">
            <span class="card-name">WHITE</span>
            <span class="card-code">127-01</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_ivory.png" alt="ivory">
          <div class="card-info">
            <span class="card-name">IVORY</span>
            <span class="card-code">127-02</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_bege.png" alt="bege">
          <div class="card-info">
            <span class="card-name">BEIGE</span>
            <span class="card-code">127-03</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_coconut.png" alt="coconut">
          <div class="card-info">
            <span class="card-name">COCONUT</span>
            <span class="card-code">127-04</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_khaki.png" alt="khaki">
          <div class="card-info">
            <span class="card-name">KHAKI</span>
            <span class="card-code">127-05</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_grey.png" alt="grey">
          <div class="card-info">
            <span class="card-name">GREY</span>
            <span class="card-code">127-06</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_dark_grey.png" alt="dark grey">
          <div class="card-info">
            <span class="card-name">DARK GREY</span>
            <span class="card-code">127-07</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/wood_look_single/wood_look_single_chocolate.png" alt="chocolate">
          <div class="card-info">
            <span class="card-name">CHOCOLATE</span>
            <span class="card-code">127-08</span>
          </div>
        </article>
      </section>
  </main>
</body>
</html>
