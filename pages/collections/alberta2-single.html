<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Decorados • Wood Look Single</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_layout_base.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_2x4.css">
</head>
<body>
  <main class="layout">

      <div class="layout-header">
        <div>
          <h1 class="h1">ALBERTA II SINGLE</h1>               <!--mude aqui-->
          <div class="book-label">Decorados</div>
        </div>
      </div>

      <section class="grid grid-2x4">
        
        <article class="card">
          <img src="./img/decorado/alberta2-single/white.png">
          <div class="card-info">
            <span class="card-name">WHITE</span>
            <span class="card-code">119-01</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/alberta2-single/ivory.png">
          <div class="card-info">
            <span class="card-name">IVORY</span>
            <span class="card-code">119-02</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/alberta2-single/bege.png">
          <div class="card-info">
            <span class="card-name">BEIGE</span>
            <span class="card-code">119-03</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/alberta2-single/warm_grey.png">
          <div class="card-info">
            <span class="card-name">WARM GREY</span>
            <span class="card-code">119-04</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/alberta2-single/ash_brown.png">
          <div class="card-info">
            <span class="card-name">ASH BROWN</span>
            <span class="card-code">119-05</span>
          </div>
        </article>

        <article class="card">
          <img src="./img/decorado/alberta2-single/dark_grey.png">
          <div class="card-info">
            <span class="card-name">DARK GREY</span>
            <span class="card-code">119-06</span>
          </div>
        </article>
        
      </section>

  </main>

</body>

</html>
