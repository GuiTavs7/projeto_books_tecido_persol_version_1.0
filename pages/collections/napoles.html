<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Decorados • Nápoles</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_layout_base.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_1x4.css">
</head>
<body>

  <main class="layout">

      <div class="layout-header">
        <div>
            <h1 class="h1">NÁPOLES</h1>               <!--mude aqui-->
            <div class="book-label">Decorados</div>
        </div>
      </div>

      <section class="grid grid-1x4">

        <section class="grid-left">
            <article class="card">
                <img src="./img/decorado/napoles/napoles_branco.png" alt="white">
                <div class="card-info">
                    <span class="card-name">WHITE</span>
                    <span class="card-code">278-01</span>
                </div>
            </article>
        </section>

        <section class="grid-right">
            <article class="card">
                <img src="./img/decorado/napoles/napoles_creme.png" alt="creme">
                <div class="card-info">
                    <span class="card-name">CREME</span>
                    <span class="card-code">278-02</span>
                </div>
            </article>

            <article class="card">
                <img src="./img/decorado/napoles/napoles_bege.png" alt="bege">
                <div class="card-info">
                    <span class="card-name">BEGE</span>
                    <span class="card-code">278-03</span>
                </div>
            </article>

            <article class="card">
                <img src="./img/decorado/napoles/napoles_marrom.png" alt="brown">
                <div class="card-info">
                    <span class="card-name">MARROM</span>
                    <span class="card-code">278-04</span>
                </div>
            </article>

            <article class="card">
                <img src="./img/decorado/napoles/napoles_cinza.png" alt="grey">
                <div class="card-info">
                    <span class="card-name">CINZA</span>
                    <span class="card-code">278-05</span>
                </div>
            </article>
        </section>
    </section>
  </main>
</body>
</html>
