<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Decorados • Tunis</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_layout_base.css">
  <link rel="stylesheet" href="./css/grid_layouts/grid_1x5.css">
</head>
<body>

  <main class="layout">

      <div class="layout-header">
        <div>
            <h1 class="h1">TUNIS</h1>               <!--mude aqui-->
            <div class="book-label">Decorados</div>
        </div>
      </div>

      <section class="grid grid-1x5">

        <section class="grid-left">
            <article class="card">
                <img src="./img/decorado/tunis/tunis_white.jpg" alt="white">
                <div class="card-info">
                    <span class="card-name">WHITE</span>
                    <span class="card-code">134-01</span>
                </div>
            </article>
        </section>

        <section class="grid-right">
            <article class="card">
                <img src="./img/decorado/tunis/tunis_ivory.png" alt="ivory">
                <div class="card-info">
                    <span class="card-name">IVORY</span>
                    <span class="card-code">134-02</span>
                </div>
            </article>

            <article class="card">
                <img src="./img/decorado/tunis/tunis_sand.png" alt="sand">
                <div class="card-info">
                    <span class="card-name">SAND</span>
                    <span class="card-code">134-03</span>
                </div>
            </article>

            <article class="card">
                <img src="./img/decorado/tunis/tunis_bege.png" alt="bege">
                <div class="card-info">
                    <span class="card-name">BEGE</span>
                    <span class="card-code">134-04</span>
                </div>
            </article>

            <article class="card">
                <img src="./img/decorado/tunis/tunis_mocha.png" alt="mocha">
                <div class="card-info">
                    <span class="card-name">MOCHA</span>
                    <span class="card-code">134-05</span>
                </div>
            </article>

            <article class="card">
                <img src="./img/decorado/tunis/tunis_grey.png" alt="grey">
                <div class="card-info">
                    <span class="card-name">GREY</span>
                    <span class="card-code">134-06</span>
                </div>
            </article>
        </section>
    </section>
  </main>
</body>
</html>
