<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="./css/main.css">
        <link rel="stylesheet" href="./css/carrossel/carrossel_certificacoes.css">
    </head>
    <body>

        <h1 class="title">Certificações</h1>

        <div class="cert-carousel">

            <button class="cert-btn prev">←</button>

            <div class="cert-track" id="certTrack">

                <div class="cert-card">
                    <img src="./img/certificacoes/greenguard_selo_01.png" alt="Greenguard">
                    <p class="cert-description">Greenguard</p>
                </div>

                <div class="cert-card">
                    <img src="./img/certificacoes/greenguard_selo_02.png" alt="Greenguard">
                    <p class="cert-description">Greenguard</p>
                </div>

                <div class="cert-card">
                    <img src="./img/certificacoes/opaco.png" alt="OEKO TEX">
                    <p class="cert-description">Opaco</p>
                </div>

                <div class="cert-card">
                    <img src="./img/certificacoes/semiopaco.png" alt="ISO 9001">
                    <p class="cert-description">Semiopaco</p>
                </div>

                <div class="cert-card">
                    <img src="./img/certificacoes/blackout.png" alt="ISO 14001">
                    <p class="cert-description">Blackout</p>
                </div>

                <div class="cert-card">
                    <img src="./img/certificacoes/semi-blackout.png" alt="Antibacterial">
                    <p class="cert-description">Semi-blackout</p>
                </div>

                <div class="cert-card">
                    <img src="./img/certificacoes/translucido.png" alt="Fire Resistant">
                    <p class="cert-description">Translucido</p>
                </div>

                <div class="cert-card">
                    <img src="./img/certificacoes/transparente.png" alt="Fire Resistant">
                    <p class="cert-description">Transparente</p>
                </div>
            </div>

            <button class="cert-btn next">→</button>
        </div>
    </body>
</html>
